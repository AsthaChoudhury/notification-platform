# ═══════════════════════════════════════════════════════
#   STEP 1 CONFIGURATION
#   No Kafka. No Redis. No Docker. Just H2 + Spring Boot.
# ═══════════════════════════════════════════════════════

server.port=8080
spring.application.name=notification-platform

# ── H2 In-Memory Database ────────────────────────────────
# H2 is a tiny database that runs inside your Java process.
# No installation needed. Data is lost when the app stops.
# Perfect for Step 1 — we replace this with PostgreSQL in Step 4.

spring.datasource.url=jdbc:h2:mem:notificationsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console — a browser-based DB explorer.
# Go to http://localhost:8080/h2-console after starting the app.
# JDBC URL: jdbc:h2:mem:notificationsdb
# Username: sa  |  Password: (leave blank)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────────
# create-drop = create tables on startup, drop on shutdown
# (perfect for H2 in development)
# In Step 4 (PostgreSQL) we change this to "validate"
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────────────────
logging.level.com.notifplatform=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{20} - %msg%n
